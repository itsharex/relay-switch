appId: com.xiaoyuandev.relay-switch
productName: Relay Switch
protocols:
  - name: Relay Switch Import
    schemes:
      - relay-switch
afterAllArtifactBuild: scripts/cleanup-mac-artifacts.cjs
directories:
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.env,.env.*,README.md}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
extraResources:
  - from: ../../core/bin
    to: core/bin
    filter:
      - "**/*"
  - from: resources/ai-mini-gateway
    to: ai-mini-gateway
    filter:
      - "**/*"
asarUnpack:
  - resources/**
mac:
  target:
    - dmg
    - pkg
    - zip
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  extendInfo:
    NSDocumentsFolderUsageDescription: Relay Switch may access files in Documents for local tooling workflows.
    NSDownloadsFolderUsageDescription: Relay Switch may access files in Downloads for local tooling workflows.
win:
  target:
    - nsis
linux:
  target:
    - AppImage
    - tar.gz
  category: Utility
dmg:
  artifactName: Relay-Switch-${version}-${arch}.${ext}
pkg:
  artifactName: Relay-Switch-${version}-${arch}.${ext}
nsis:
  artifactName: Relay-Switch-${version}-${arch}-setup.${ext}
appImage:
  artifactName: Relay-Switch-${version}-${arch}.${ext}
artifactName: Relay-Switch-${version}-${os}-${arch}.${ext}
publish:
  provider: github
  owner: xiaoyuandev
  repo: relay-switch
  releaseType: release
npmRebuild: false
